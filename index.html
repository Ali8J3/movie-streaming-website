<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Seenema</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Css/index.css">
<link rel="stylesheet" href="Css/header.css">
<link rel="stylesheet" href="Css/footer.css">

</head>
<body>

<!-- HEADER -->
<div id="header-container"></div>

<!-- Featured Title -->
<section class="featured-section">

    <div class="featured-poster" id="featuredPoster">

        <div class="featured-overlay">

            <button id="featuredPlayBtn">
                <i class="bi bi-play-fill"></i>
            </button>

        </div>

        <div class="featured-content">

            <h1 id="featuredTitle"></h1>

            <div class="featured-slider" id="featuredSlider"></div>

        </div>

    </div>

</section>
<!-- MOVIES -->
<section class="content-row">

    <div class="section-header">
        <h2>فیلم‌های جدید</h2>
        <a href="#">مشاهده همه</a>
    </div>

    <div class="movie-slider" id="newMoviesSlider"></div>

</section>

<section class="content-row">

    <div class="section-header">
        <h2>سریال‌های جدید</h2>
        <a href="#">مشاهده همه</a>
    </div>

    <div class="movie-slider" id="newSeriesSlider"></div>

</section>

<section class="content-row">

    <div class="section-header">
        <h2>انیمه‌های جدید</h2>
        <a href="#">مشاهده همه</a>
    </div>

    <div class="movie-slider" id="newAnimeSlider"></div>

</section>

<!-- SEARCH -->
<div class="search-box" id="searchBox">
  <input type="text" id="searchInput" placeholder="جستجو..." />
  <div class="search-results" id="searchResults"></div>
</div>

<!-- Footer -->
<div id="footer-container"></div>

<script src="Js/data.js"></script>
<script src="Js/MovieLists.js"></script>
<script src="Js/index.js"></script>
<script src="Js/featured.js"></script>
<script src="js/components.js"></script> <!-- adds header and footer -->

</body>
</html>

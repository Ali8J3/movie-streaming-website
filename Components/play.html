<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/header.css">
    <link rel="stylesheet" href="../Css/footer.css">
    <link rel="stylesheet" href="../Css/play.css">
</head>

<body>

    <div id="header-container"></div>

    <section class="movie-container" id="movieContainer">
        
        <img src="#" alt="BG-Poster" id="BG-Poster">

        <div class="movie-backdrop"></div>

        <div class="movie-content">

            <img
                id="moviePoster"
                class="movie-poster"
            >

            <div class="movie-details">

                <h1 id="movieTitle"></h1>

                <div
                    id="movieMeta"
                    class="movie-meta"
                ></div>

                <h2>داستان فیلم</h2>

                <p id="moviePlot"></p>

            </div>

        </div>

    </section>

    <section class="actions-container">
    
        <div class="stream-box">
        
            <h2>پخش آنلاین</h2>
        
            <a
                id="watchBtn"
                class="stream-btn"
            >
                مشاهده آنلاین
            </a>
        
        </div>
    
        <div class="download-box">
        
            <h2>دانلود</h2>
        
            <div class="quality-grid">
            
                <a class="quality-btn">
                    دانلود 480p
                </a>
            
                <a class="quality-btn">
                    دانلود 720p
                </a>
            
                <a class="quality-btn">
                    دانلود 1080p
                </a>
            
            </div>
        
        </div>
    
    </section>

    <section class="suggestions">

        <h2>پیشنهادهای مشابه</h2>

        <ul
            id="suggestionsSlider"
            class="suggestions-slider"
        ></ul>

    </section>

    <section class="comments">

        <h2>نظرات کاربران</h2>

        <textarea
            id="commentInput"
            placeholder="نظر خود را بنویسید..."
        ></textarea>

        <button id="commentBtn">
            ثبت نظر
        </button>

        <div id="commentsList"></div>

    </section>

    <div id="footer-container"></div>

    <script src="../Js/api.js"></script>
    <script src="../Js/MovieLists.js"></script>
    <script src="../Js/play.js"></script>
    <script src="../Js/components.js"></script>

</body>

</html>

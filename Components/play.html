<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/header.css">
    <link rel="stylesheet" href="../Css/footer.css">
    <link rel="stylesheet" href="../Css/play.css">
</head>

<body>

    <div id="header-container"></div>

    <section id="heroSection" class="hero">

        <div class="hero-overlay">

            <div class="hero-content">

                <h1 id="movieTitle"></h1>

                <div id="movieMeta" class="movie-meta"></div>

            </div>

        </div>

    </section>

    <section class="movie-container">

        <img
            id="moviePoster"
            class="movie-poster"
        >

        <div class="movie-details">

            <h2>داستان فیلم</h2>

            <p id="moviePlot"></p>

        </div>

    </section>

    <section class="stream-box">

        <h2>پخش و دانلود</h2>

        <div class="quality-grid">

            <a
                id="watchBtn"
                class="quality-btn"
            >
                پخش آنلاین
            </a>

            <a class="quality-btn">
                دانلود 480p
            </a>

            <a class="quality-btn">
                دانلود 720p
            </a>

            <a class="quality-btn">
                دانلود 1080p
            </a>

        </div>

    </section>

    <section class="suggestions">

        <h2>پیشنهادهای مشابه</h2>

        <ul
            id="suggestionsSlider"
            class="suggestions-slider"
        ></ul>

    </section>

    <section class="comments">

        <h2>نظرات کاربران</h2>

        <textarea
            id="commentInput"
            placeholder="نظر خود را بنویسید..."
        ></textarea>

        <button id="commentBtn">
            ثبت نظر
        </button>

        <div id="commentsList"></div>

    </section>

    <div id="footer-container"></div>

    <script src="../Js/api.js"></script>
    <script src="../Js/MovieLists.js"></script>
    <script src="../Js/play.js"></script>
    <script src="../Js/components.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../Css/header.css">
    <link rel="stylesheet" href="../Css/footer.css">
    <link rel="stylesheet" href="../Css/play.css">
</head>

<body>

    <div id="loadingScreen">
        <div class="loader"></div>
    </div>

    <div id="header-container"></div>

    <div class="container">
    
        <section class="movie-container" id="movieContainer">
        
        <img src="#" alt="BG-Poster" id="BG-Poster">

        <div class="movie-backdrop"></div>

        <div class="movie-content">

            <img
                id="moviePoster"
                class="movie-poster"
            >

            <div class="movie-details">

                <h1 id="movieTitle"></h1>

                <div id="movieMeta" class="movie-meta">
                    
                    <div class="descItem">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-film" viewBox="0 0 16 16"> <path d="M0 1a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1zm4 0v6h8V1zm8 8H4v6h8zM1 1v2h2V1zm2 3H1v2h2zM1 7v2h2V7zm2 3H1v2h2zm-2 3v2h2v-2zM15 1h-2v2h2zm-2 3v2h2V4zm2 3h-2v2h2zm-2 3v2h2v-2zm2 3h-2v2h2z"/> </svg>
                        <p id="rating"></p>
                    </div>

                </div>

                <h2>داستان فیلم</h2>

                <p id="moviePlot"></p>

            </div>

        </div>

        </section>

        <section class="actions-container">
    
            <div class="stream-box">

                <div class="stream-item">
                    <span style="color: white;">کیفیت :</span>
                    <span style="color: #FFC700;">BluRay 720p</span>
                </div>

                <div class="stream-item">
                    <span style="color: #979797;">انکودر :</span>
                    <span style="color: white;">unknown</span>
                </div>

                <a id="watchBtn" class="stream-btn">مشاهده آنلاین</a>
            
            </div>

            <section id="seriesSection" class="series-section" style="display:none;">
                    
                <h2>فصل ها و قسمت ها</h2>
                    
                <div id="seasonsContainer"></div>
                    
            </section>
    
        </section>

        <!-- <section class="suggestions">

        <h2>پیشنهادهای مشابه</h2>

        <ul
            id="suggestionsSlider"
            class="suggestions-slider"
        ></ul>

        </section> -->

        <section class="comments">

        <h2>نظرات کاربران</h2>

        <textarea
            id="commentInput"
            placeholder="نظر خود را بنویسید..."
        ></textarea>

        <button id="commentBtn">
            ثبت نظر
        </button>

        <div id="commentsList"></div>

        </section>

    </div>

    <div id="footer-container"></div>

    <script src="../Js/auth.js"></script>
    <script src="../Js/api.js"></script>
    <script src="../Js/MovieLists.js"></script>
    <script src="../Js/play.js"></script>
    <script src="../Js/components.js"></script>

</body>

</html>

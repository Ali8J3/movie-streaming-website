<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../Css/header.css">
    <link rel="stylesheet" href="../Css/footer.css">
    <link rel="stylesheet" href="../Css/play.css">
</head>

<body>

    <div id="loadingScreen">
        <div class="loader"></div>
    </div>

    <div id="header-container"></div>

    <div class="container">
    
        <section class="movie-container" id="movieContainer">
        
            <img src="#" alt="BG-Poster" id="BG-Poster">

            <div class="movie-backdrop"></div>

            <div class="movie-content">

                <img
                    id="moviePoster"
                    class="movie-poster"
                >

                <div class="movie-details">

                    <h1 id="movieTitle"></h1>

                        <div class="descItem">
                            <img width="48" height="48" src="https://img.icons8.com/color/48/imdb.png" alt="imdb"/>
                            <p id="rating"></p>
                        </div>

                    <h2>داستان فیلم</h2>

                    <p id="moviePlot"></p>

                    <div id="movieMeta" class="movie-meta">

                        <h2>ژانر ها:</h2>
                        
                        <div class="genreContainer">

                            <div class="genreWrapper">
                            </div>

                        </div>

                    </div>

                    <div class="movieData">

                        <div class="dataItem" id="runtime">
                            <p>زمان: </p>
                        </div>

                        <div class="dataItem" id="release">
                            <p>اكران: </p>
                        </div>
                        
                        <div class="dataItem" id="country">
                            <p>كشور سازنده: </p>
                        </div>
                        
                        <div class="dataItem" id="language">
                            <p>زبان: </p>
                        </div>
                        
                        <div class="dataItem" id="rated">
                            <p>رده سني: </p>
                        </div>
                    </div>
                    

                </div>

            </div>

        </section>
        
        <section class="cast-section">
            <h2>بازیگران</h2>

            <div id="castContainer" class="cast-container">
                <p class="cast-item">بازیگر 1</p>
            </div>

            <h2>كارگردان</h2>
            
            <div id="directorContainer" class="director-container">
                <p class="director-item">كارگردان 1</p>
            </div>

        </section>

        <h2 class="stream-title" style="margin-right: 2rem; margin-top: 3rem;">تماشا :</h2>

        <section class="actions-container">
    
            <div class="stream-box">

                <div class="stream-item">
                    <span style="color: white;">کیفیت :</span>
                    <span style="color: #FFC700;">BluRay 720p</span>
                </div>

                <div class="stream-item">
                    <span style="color: #979797;">انکودر :</span>
                    <span style="color: white;">unknown</span>
                </div>

                <a id="watchBtn" class="stream-btn">مشاهده آنلاین</a>
            
            </div>

            <section id="seriesSection" class="series-section" style="display:none;">
                    
                <h2>فصل ها و قسمت ها</h2>
                    
                <div id="seasonsContainer"></div>
                    
            </section>
    
        </section>

        <section class="comments">

            <h2>نظرات کاربران</h2>
            
            <textarea
                id="commentInput"
                placeholder="نظر خود را بنویسید..."
            ></textarea>
            
            <button id="commentBtn">
                ثبت نظر
            </button>
        
            <div id="commentsList"></div>

        </section>

    </div>

    <div id="footer-container"></div>

    <script src="../Js/auth.js"></script>
    <script src="../Js/search.js"></script>
    <script src="../Js/api.js"></script>
    <script src="../Js/MovieLists.js"></script>
    <script src="../Js/play.js"></script>
    <script src="../Js/components.js"></script>

</body>

</html>
